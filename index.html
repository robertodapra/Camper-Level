<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Camper Level Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --accent: #00d1ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; }
        
        /* Header elegante */
        #header {
            position: absolute; top: 40px; left: 0; width: 100%; text-align: center; z-index: 10;
            pointer-events: none; letter-spacing: 4px; font-weight: 200; opacity: 0.8;
        }

        /* Stato del Livello */
        #status-container {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            z-index: 10; text-align: center;
        }
        #level-badge {
            padding: 8px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            font-size: 12px; text-transform: uppercase; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }

        /* Pulsanti Minimalisti */
        .controls {
            position: absolute; bottom: 50px; left: 0; width: 100%; display: flex;
            justify-content: center; gap: 20px; z-index: 10;
        }
        button {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 15px 30px; border-radius: 12px; cursor: pointer;
            font-size: 14px; backdrop-filter: blur(10px); transition: 0.3s;
        }
        button:active { background: var(--accent); color: black; border-color: var(--accent); }
        .btn-main { background: var(--accent); color: black; font-weight: bold; border: none; }

        #debug-info { position: absolute; bottom: 10px; right: 10px; font-size: 10px; opacity: 0.3; }
    </style>
</head>
<body>

<div id="header">CAMPER LEVEL ELITE</div>

<div id="status-container">
    <div id="level-badge">IN ATTESA DI CONNESSIONE</div>
</div>

<div class="controls">
    <button id="btnConnect" class="btn-main" onclick="connectBLE()">CONNETTI</button>
    <button onclick="sendTara()">AZZERA (TARA)</button>
</div>

<div id="debug-info">V 2.0 Luxury Edition</div>

<script>
    // --- SCENA 3D ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.Fog(0x050505, 10, 25);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(8, 4, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Controlli per girare il camper col dito
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2.1; // Impedisce di andare sotto il terreno

    // Luci cinematografiche
    const ambient = new THREE.AmbientLight(0xffffff, 0.2);
    scene.add(ambient);

    const spotlight = new THREE.SpotLight(0x00d1ff, 2);
    spotlight.position.set(5, 10, 5);
    spotlight.castShadow = true;
    scene.add(spotlight);

    const pointLight = new THREE.PointLight(0xffffff, 0.5);
    pointLight.position.set(-5, 5, -5);
    scene.add(pointLight);

    // MODELLO CAMPER ELITE
    const camper = new THREE.Group();
    
    // Materiali Moderni
    const matWhite = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1, metalness: 0.5 });
    const matBlack = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });

    const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1.2, 4.5), matWhite);
    body.castShadow = true;
    camper.add(body);

    const cabin = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 1.8), matWhite);
    cabin.position.set(0, 0.8, 1.35);
    camper.add(cabin);

    // Vetro scuro
    const glass = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.6, 0.1), matBlack);
    glass.position.set(0, 0.6, 2.26);
    camper.add(glass);

    // Ruote
    const wheelGeom = new THREE.CylinderGeometry(0.38, 0.38, 0.3, 32);
    [[1.1, -0.6, 1.5], [-1.1, -0.6, 1.5], [1.1, -0.6, -1.5], [-1.1, -0.6, -1.5]].forEach(p => {
        const w = new THREE.Mesh(wheelGeom, matBlack);
        w.rotation.z = Math.PI/2;
        w.position.set(p[0], p[1], p[2]);
        camper.add(w);
    });

    scene.add(camper);

    // Terreno (Piano riflettente)
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 100),
        new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.8 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -1.1;
    floor.receiveShadow = true;
    scene.add(floor);

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // --- BLUETOOTH ---
    let characteristic;
    const SVC_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const CHAR_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

    async function connectBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'Camper_Level_Pro' }],
                optionalServices: [SVC_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SVC_UUID);
            characteristic = await service.getCharacteristic(CHAR_UUID);
            
            document.getElementById('btnConnect').style.display = 'none';
            document.getElementById('level-badge').innerText = "CONNESSO";
            
            characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', (e) => {
                let view = new DataView(e.target.value.buffer);
                let pitch = view.getFloat32(0, true);
                let roll = view.getFloat32(4, true);

                // Rotazione Camper
                camper.rotation.x = -pitch * (Math.PI / 180);
                camper.rotation.z = -roll * (Math.PI / 180);

                // UI Logic (Niente decimali, solo stato)
                const badge = document.getElementById('level-badge');
                if (Math.abs(pitch) < 0.6 && Math.abs(roll) < 0.6) {
                    badge.innerText = "PERFETTAMENTE IN BOLLA";
                    badge.style.color = "#00ff88";
                    badge.style.borderColor = "#00ff88";
                    spotlight.color.setHex(0x00ff88);
                } else {
                    badge.innerText = "REGOLA INCLINAZIONE";
                    badge.style.color = "#ff4444";
                    badge.style.borderColor = "#ff4444";
                    spotlight.color.setHex(0xff4444);
                }
            });
        } catch (err) { console.log(err); }
    }

    async function sendTara() {
        if (characteristic) {
            await characteristic.writeValue(new TextEncoder().encode("TARA"));
        }
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>

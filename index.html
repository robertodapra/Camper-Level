<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Camper HUD Precision</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --warn: #ff8c00; --ok: #00ff88; }
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* Interfaccia HUD Overlay */
        #hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 2px solid rgba(0, 242, 255, 0.1); box-sizing: border-box;
            pointer-events: none; z-index: 10;
        }

        /* Mirino Centrale */
        .crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; border: 1px solid var(--neon);
            border-radius: 50%; opacity: 0.5;
        }
        .crosshair::before { content: ''; position: absolute; top: 50%; left: -20px; width: 140px; height: 1px; background: var(--neon); }
        .crosshair::after { content: ''; position: absolute; left: 50%; top: -20px; width: 1px; height: 140px; background: var(--neon); }

        /* Letture Laterali */
        .data-bar {
            position: absolute; top: 50%; transform: translateY(-50%);
            height: 200px; width: 60px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 242, 255, 0.2); display: flex; align-items: center; justify-content: center;
        }
        #pitch-bar { left: 20px; }
        #roll-bar { right: 20px; }
        .label { font-size: 10px; color: var(--neon); text-orientation: sideways; writing-mode: vertical-lr; }

        /* Pulsanti */
        .nav-buttons {
            position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; gap: 30px; z-index: 20;
        }
        button {
            background: none; border: 1px solid var(--neon); color: var(--neon);
            padding: 15px 30px; font-family: inherit; font-weight: bold; cursor: pointer;
            transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        button:active { background: var(--neon); color: black; }
        
        #status-text {
            position: absolute; top: 40px; width: 100%; text-align: center;
            font-size: 18px; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 10px var(--neon);
        }
    </style>
</head>
<body>

<div id="hud-overlay">
    <div id="status-text">SYSTEM OFFLINE</div>
    <div class="crosshair"></div>
    <div id="pitch-bar" class="data-bar"><div class="label">PITCH AXIS</div></div>
    <div id="roll-bar" class="data-bar"><div class="label">ROLL AXIS</div></div>
</div>

<div class="nav-buttons">
    <button onclick="connectBLE()">ENGAGE SYSTEM</button>
    <button onclick="sendTara()">ZERO CALIBRATION</button>
</div>

<script>
    // --- SCENA 3D (Orizzonte Artificiale) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Creazione Griglia Dinamica (L'Orizzonte)
    const gridGroup = new THREE.Group();
    const grid = new THREE.GridHelper(100, 50, 0x00f2ff, 0x004444);
    gridGroup.add(grid);
    
    // Aggiungiamo un piano luminoso sotto la griglia
    const planeGeom = new THREE.PlaneGeometry(100, 100);
    const planeMat = new THREE.MeshBasicMaterial({ color: 0x001111, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
    const plane = new THREE.Mesh(planeGeom, planeMat);
    plane.rotation.x = Math.PI / 2;
    gridGroup.add(plane);

    scene.add(gridGroup);
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();

    // --- LOGICA BLUETOOTH ---
    let characteristic;
    const SVC_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const CHAR_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

    async function connectBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'Camper_Level_Pro' }],
                optionalServices: [SVC_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SVC_UUID);
            characteristic = await service.getCharacteristic(CHAR_UUID);
            
            document.getElementById('status-text').innerText = "SYSTEM ACTIVE";
            characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', handleData);
        } catch (e) { alert("CONNECTION FAILED"); }
    }

    function handleData(event) {
        let view = new DataView(event.target.value.buffer);
        let pitch = view.getFloat32(0, true);
        let roll = view.getFloat32(4, true);

        // L'orizzonte 3D si muove in modo opposto al sensore per simulare la realtà
        gridGroup.rotation.x = pitch * (Math.PI / 180);
        gridGroup.rotation.z = -roll * (Math.PI / 180);

        // Cambia colore in base alla precisione
        const isLevel = Math.abs(pitch) < 0.5 && Math.abs(roll) < 0.5;
        const color = isLevel ? "#00ff88" : (Math.abs(pitch) > 5 || Math.abs(roll) > 5 ? "#ff4444" : "#00f2ff");
        
        document.getElementById('status-text').style.color = color;
        document.getElementById('status-text').innerText = isLevel ? "LEVEL OPTIMIZED" : "ADJUSTING POSITION";
        grid.material.color.set(color);
    }

    async function sendTara() {
        if (characteristic) {
            await characteristic.writeValue(new TextEncoder().encode("TARA"));
        }
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camper 3D Leveler PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #ui { 
            position: absolute; top: 20px; width: 100%; text-align: center; z-index: 10; 
            pointer-events: none; background: rgba(0,0,0,0.3); padding: 10px 0;
        }
        
        #angles { font-size: 26px; font-weight: bold; color: #4caf50; letter-spacing: 1px; }
        #status-msg { color: #ffeb3b; font-size: 18px; margin-top: 5px; text-transform: uppercase; }

        .btn-container { position: absolute; bottom: 40px; width: 100%; text-align: center; z-index: 10; }
        
        button { 
            pointer-events: auto; padding: 18px 35px; border-radius: 50px; border: none; 
            font-weight: bold; font-size: 16px; cursor: pointer; margin: 10px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.6); transition: all 0.2s ease;
            text-transform: uppercase;
        }
        
        .btn-conn { background: #007bff; color: white; }
        .btn-conn:active { transform: scale(0.95); background: #0056b3; }
        
        .btn-tara { background: #fd7e14; color: white; }
        .btn-tara:active { transform: scale(0.95); background: #d96d12; }

        /* Overlay per il caricamento */
        #instructions {
            position: absolute; bottom: 120px; width: 100%; text-align: center;
            font-size: 14px; color: #aaa; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="angles">PITCH: 0.0° | ROLL: 0.0°</div>
    <div id="status-msg">In attesa di connessione...</div>
</div>

<div id="instructions">Muovi il sensore per ruotare il camper 3D</div>

<div class="btn-container">
    <button class="btn-conn" onclick="connectBLE()">Connetti Camper</button>
    <button class="btn-tara" onclick="sendTara()">Imposta Zero (Tara)</button>
</div>

<script>
    // --- MOTORE GRAFICO 3D ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Luci
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // COSTRUZIONE CAMPER (GRUPPO)
    const camperGroup = new THREE.Group();
    
    // Scocca (Bianca)
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
    const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.3, 4.5), bodyMat);
    camperGroup.add(body);

    // Mansarda
    const mansarda = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.7, 1.8), bodyMat);
    mansarda.position.set(0, 1, 1.35);
    camperGroup.add(mansarda);

    // Vetri (Neri riflettenti)
    const glassMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
    const windshield = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 0.1), glassMat);
    windshield.position.set(0, 0.5, 2.26);
    camperGroup.add(windshield);

    // Ruote (4 cilindri)
    const wheelGeom = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 32);
    const wheelMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
    const wheelPositions = [
        [1.1, -0.65, 1.5], [-1.1, -0.65, 1.5], // Anteriori
        [1.1, -0.65, -1.5], [-1.1, -0.65, -1.5] // Posteriori
    ];
    
    wheelPositions.forEach(pos => {
        const w = new THREE.Mesh(wheelGeom, wheelMat);
        w.rotation.z = Math.PI / 2;
        w.position.set(pos[0], pos[1], pos[2]);
        camperGroup.add(w);
    });

    scene.add(camperGroup);
    
    // Griglia del terreno per riferimento
    const grid = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
    grid.position.y = -1.1;
    scene.add(grid);

    camera.position.set(6, 4, 8);
    camera.lookAt(0, 0, 0);

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();

    // --- COMUNICAZIONE BLUETOOTH ---
    let characteristic;
    const SVC_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const CHAR_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

    async function connectBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'Camper_Level_Pro' }],
                optionalServices: [SVC_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SVC_UUID);
            characteristic = await service.getCharacteristic(CHAR_UUID);
            
            document.getElementById('status-msg').innerText = "CONNESSO ✅";
            characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', (e) => {
                let view = new DataView(e.target.value.buffer);
                let pitch = view.getFloat32(0, true);
                let roll = view.getFloat32(4, true);

                // Aggiorna Testo
                document.getElementById('angles').innerText = `PITCH: ${pitch.toFixed(1)}° | ROLL: ${roll.toFixed(1)}°`;

                // RUOTA IL MODELLO 3D (Conversione Gradi in Radianti)
                camperGroup.rotation.x = -pitch * (Math.PI / 180);
                camperGroup.rotation.z = -roll * (Math.PI / 180);

                // CAMBIO COLORE IN BASE ALLA PRECISIONE
                if (Math.abs(pitch) <= 0.5 && Math.abs(roll) <= 0.5) {
                    body.material.color.setHex(0x55ff55); // Verde: In bolla
                    document.getElementById('status-msg').innerText = "SEI IN BOLLA! ✅";
                } else {
                    body.material.color.setHex(0xffffff); // Bianco: Muovi ancora
                    document.getElementById('status-msg').innerText = "REGOLA LIVELLO...";
                }
            });
        } catch (err) {
            console.log(err);
            alert("Errore di connessione Bluetooth.");
        }
    }

    async function sendTara() {
        if (characteristic) {
            await characteristic.writeValue(new TextEncoder().encode("TARA"));
            alert("Punto zero aggiornato!");
        } else {
            alert("Connetti prima il sensore!");
        }
    }

    // Resize finestra
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>

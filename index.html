<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Level</title>
    <style>
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #canvas { touch-action: none; }
        .ui { position: absolute; bottom: 50px; display: flex; gap: 20px; }
        button { background: transparent; border: 1px solid #333; color: #666; padding: 15px 30px; border-radius: 50px; font-size: 12px; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        button:active { border-color: #fff; color: #fff; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="ui">
    <button onclick="connectBLE()">CONNESSIONE</button>
    <button onclick="sendTara()">TARA</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let w, h, cx, cy;
    let pos = { x: 0, y: 0 };
    let target = { x: 0, y: 0 };

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        cx = w / 2; cy = h / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, w, h);
        
        // Cerchio guida (Target)
        ctx.beginPath();
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 2;
        ctx.arc(cx, cy, 100, 0, Math.PI * 2);
        ctx.stroke();

        // Interpolazione fluida della bolla
        pos.x += (target.x - pos.x) * 0.15;
        pos.y += (target.y - pos.y) * 0.15;

        // Bolla di luce
        let grad = ctx.createRadialGradient(cx + pos.x, cy + pos.y, 5, cx + pos.x, cy + pos.y, 40);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(1, '#00d1ff');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx + pos.x, cy + pos.y, 40, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(draw);
    }
    draw();

    // BLE Logic
    let characteristic;
    async function connectBLE() {
        const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'Camper_Level_Pro' }], optionalServices: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dcca9e");
        characteristic = await service.getCharacteristic("6e400003-b5a3-f393-e0a9-e50e24dcca9e");
        characteristic.startNotifications();
        characteristic.addEventListener('characteristicvaluechanged', (e) => {
            let v = new DataView(e.target.value.buffer);
            target.x = v.getFloat32(4, true) * 5; // Roll
            target.y = v.getFloat32(0, true) * 5; // Pitch
        });
    }

    function sendTara() { if(characteristic) characteristic.writeValue(new TextEncoder().encode("TARA")); }
</script>
</body>
</html>
